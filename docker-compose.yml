services:
  postgres:
    image: postgres:15-alpine
    container_name: artifex-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: artifex
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
